<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Glass Head</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
        }
        canvas { 
            display: block; 
        }
    </style>
</head>
<body>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // === СЦЕНА ===
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    // === КАМЕРА ===
    const camera = new THREE.PerspectiveCamera(10, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 25);

    // === РЕНДЕРЕР ===
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    // === УПРАВЛЕНИЕ ===
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // === ОСВЕЩЕНИЕ ===
    const dirLight = new THREE.DirectionalLight(0xffffff, 3);
    dirLight.position.set(-9.48, 3.17, 4.1);
    scene.add(dirLight);

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.3);
    scene.add(hemiLight);

    // === МАТЕРИАЛ "Soapy Glass" ===
    let glassMaterial;
    
    const rgbeLoader = new RGBELoader();
    rgbeLoader.load('https://dl.polyhaven.org/file/ph-assets/HDRIs/low/1k/studio_small_03_1k.hdr', function(hdrTexture) {
        hdrTexture.mapping = THREE.EquirectangularReflectionMapping;
        scene.environment = hdrTexture;
        
        glassMaterial = new THREE.MeshPhysicalMaterial({
            color: new THREE.Color('#9FCDC8'),
            transmission: 1.0,
            opacity: 1,
            ior: 1.39,
            thickness: 9.28,
            metalness: 0.21,
            roughness: 0.94,
            clearcoat: 0.3,
            clearcoatRoughness: 0.5,
            envMapIntensity: 2.5
        });

        // === ЗАГРУЗКА МОДЕЛИ ===
        const loader = new GLTFLoader();
        loader.load("head.glb", (gltf) => {
            model = gltf.scene;
            
            // Применяем материал ко всем частям модели
            model.traverse((child) => {
                if (child.isMesh) {
                    child.material = glassMaterial.clone();
                }
            });
            
            // Масштаб и позиция
            model.scale.set(0.06, 0.06, 0.06);
            model.rotation.set(-0.0225, 0.0083, 0.1854);
            
            scene.add(model);
        }, undefined, (error) => {
            console.error('Ошибка загрузки модели:', error);
        });
    });

    let model;

    // === АНИМАЦИЯ ===
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // === РЕСАЙЗ ===
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
