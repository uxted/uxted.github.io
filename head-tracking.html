<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Glass Head Tracking</title>

<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script type="module">

import * as THREE from 'https://esm.sh/three@0.158.0';
import { GLTFLoader } from 'https://esm.sh/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';
import { RGBELoader } from 'https://esm.sh/three@0.158.0/examples/jsm/loaders/RGBELoader.js';

const canvas = document.getElementById('canvas');

//
// SCENE
//

const scene = new THREE.Scene();

//
// CAMERA
//

const camera = new THREE.PerspectiveCamera(
  35,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);

camera.position.set(0, 0, 3);

//
// RENDERER
//

const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  alpha: true
});

renderer.setSize(window.innerWidth, window.innerHeight);

renderer.setPixelRatio(
  Math.min(window.devicePixelRatio, 2)
);

renderer.outputColorSpace = THREE.SRGBColorSpace;

renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

renderer.physicallyCorrectLights = true;

//
// HDR ENVIRONMENT
//

new RGBELoader().load(
  'studio.hdr',
  (texture) => {

    texture.mapping =
      THREE.EquirectangularReflectionMapping;

    scene.environment = texture;

  }
);

//
// LIGHTS
//

const light1 = new THREE.DirectionalLight(
  0xffffff,
  2
);

light1.position.set(5, 5, 5);

scene.add(light1);

const light2 = new THREE.DirectionalLight(
  0xffffff,
  1
);

light2.position.set(-5, 2, 3);

scene.add(light2);

const ambient = new THREE.AmbientLight(
  0xffffff,
  0.8
);

scene.add(ambient);

//
// MODEL
//

let model;

const loader = new GLTFLoader();

loader.load(

  'head.glb',

  (gltf) => {

    model = gltf.scene;

    //
    // CENTER MODEL
    //

    const box =
      new THREE.Box3().setFromObject(model);

    const center =
      box.getCenter(new THREE.Vector3());

    model.position.sub(center);

    //
    // AUTO SCALE
    //

    const size =
      box.getSize(new THREE.Vector3()).length();

    const scale = 2 / size;

    model.scale.setScalar(scale);

    //
    // GLASS MATERIAL
    //

    model.traverse((child) => {

      if (child.isMesh) {

        child.material =
          new THREE.MeshPhysicalMaterial({

            color: 0x4893CE,

            metalness: 0.15,

            roughness: 0.5,

            transmission: 6,

            thickness: 1.5,

            ior: 0.95,

            envMapIntensity: 1.5,

            clearcoat: 0,

            clearcoatRoughness: 0

          });

      }

    });

    scene.add(model);

    console.log('MODEL LOADED');

  },

  undefined,

  (error) => {

    console.error('GLB LOAD ERROR:', error);

  }

);

//
// CURSOR TRACKING
//

let targetX = 0;
let targetY = 0;

let currentX = 0;
let currentY = 0;

//
// DESKTOP
//

window.addEventListener('mousemove', (e) => {

  targetX =
    (e.clientX / window.innerWidth - 0.5);

  targetY =
    (e.clientY / window.innerHeight - 0.5);

});

//
// MOBILE
//

window.addEventListener('touchmove', (e) => {

  const touch = e.touches[0];

  targetX =
    (touch.clientX / window.innerWidth - 0.5);

  targetY =
    (touch.clientY / window.innerHeight - 0.5);

});

//
// ANIMATION
//

function animate() {

  requestAnimationFrame(animate);

  if (model) {

    currentX +=
      (targetX - currentX) * 0.06;

    currentY +=
      (targetY - currentY) * 0.06;

    model.rotation.y =
      currentX * 1.2;

    model.rotation.x =
      currentY * 0.7;

  }

  renderer.render(scene, camera);

}

animate();

//
// RESIZE
//

window.addEventListener('resize', () => {

  camera.aspect =
    window.innerWidth / window.innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );

});

</script>

</body>
</html>
