<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Glass Head</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
}

canvas {
  display: block;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script type="module">
import * as THREE from 'https://esm.sh/three@0.158.0';
import { GLTFLoader } from 'https://esm.sh/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';
import { RGBELoader } from 'https://esm.sh/three@0.158.0/examples/jsm/loaders/RGBELoader.js';

const canvas = document.getElementById("canvas");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  40,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);

camera.position.set(0, 0, 2.8);

const renderer = new THREE.WebGLRenderer({
  canvas,
  alpha: true,
  antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.35;
renderer.physicallyCorrectLights = true;

// HDR окружение
new RGBELoader().load(
  'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/studio_small_09_1k.hdr',
  function(texture) {
    texture.mapping = THREE.EquirectangularReflectionMapping;
    scene.environment = texture;
  }
);

// Свет
const key = new THREE.DirectionalLight(0xffffff, 4);
key.position.set(3, 2, 5);
scene.add(key);

const rim = new THREE.DirectionalLight(0xffffff, 2);
rim.position.set(-4, 1, -2);
scene.add(rim);

const fill = new THREE.AmbientLight(0xffffff, 1.5);
scene.add(fill);

let model;

const loader = new GLTFLoader();

loader.load("head.glb", (gltf) => {
  model = gltf.scene;

  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  model.position.sub(center);

  const size = box.getSize(new THREE.Vector3()).length();
  const scale = 2.3 / size;
  model.scale.setScalar(scale);

  model.traverse((child) => {
    if (child.isMesh) {
      child.material = new THREE.MeshPhysicalMaterial({
        transmission: 1,
        roughness: 0.02,
        thickness: 1.4,
        ior: 1.52,
        envMapIntensity: 3.5,
        clearcoat: 1,
        clearcoatRoughness: 0,
        transparent: true,
        opacity: 1
      });
    }
  });

  scene.add(model);

  console.log("MODEL LOADED");
});

let targetX = 0;
let targetY = 0;
let currentX = 0;
let currentY = 0;

window.addEventListener("mousemove", (e) => {
  targetX = (e.clientX / window.innerWidth - 0.5);
  targetY = (e.clientY / window.innerHeight - 0.5);
});

window.addEventListener("touchmove", (e) => {
  const t = e.touches[0];
  targetX = (t.clientX / window.innerWidth - 0.5);
  targetY = (t.clientY / window.innerHeight - 0.5);
});

function animate() {
  requestAnimationFrame(animate);

  if (model) {
    currentX += (targetX - currentX) * 0.06;
    currentY += (targetY - currentY) * 0.06;

    model.rotation.y = currentX * 1.2;
    model.rotation.x = currentY * 0.6;
  }

  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
