<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Head</title>

<style>
  html,
  body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
  }

  #ascii {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: black;
  }

  pre {
    margin: 0;
    color: #4893CE;
    background: black;
    font-family: monospace;
    font-size: 64px;
    line-height: 48px;
  }
</style>

<!-- IMPORT MAP -->

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
  }
}
</script>

</head>

<body>

<div id="ascii"></div>

<script type="module">

import * as THREE from 'three';

import { GLTFLoader }
from 'three/addons/loaders/GLTFLoader.js';

import { AsciiEffect }
from 'three/addons/effects/AsciiEffect.js';

//
// SCENE
//

const scene = new THREE.Scene();

scene.background =
  new THREE.Color(0x000000);

//
// CAMERA
//

const camera =
  new THREE.PerspectiveCamera(

    35,

    window.innerWidth /
    window.innerHeight,

    0.1,

    100

  );

camera.position.z = 3;

//
// RENDERER
//

const renderer =
  new THREE.WebGLRenderer();

renderer.setSize(
  window.innerWidth,
  window.innerHeight
);

renderer.outputColorSpace =
  THREE.SRGBColorSpace;

//
// ASCII EFFECT
//

const effect =
  new AsciiEffect(

    renderer,

    ' ▓▒░#@%*+=-:.',

    { invert: true }

  );

effect.setSize(
  window.innerWidth,
  window.innerHeight
);

document
  .getElementById('ascii')
  .appendChild(effect.domElement);

effect.domElement.style.color =
  '#4893CE';

effect.domElement.style.backgroundColor =
  'black';

//
// LIGHTS
//

const light1 =
  new THREE.DirectionalLight(
    0xffffff,
    2
  );

light1.position.set(5, 5, 5);

scene.add(light1);

scene.add(
  new THREE.AmbientLight(
    0xffffff,
    1
  )
);

//
// MODEL
//

let model;

const loader =
  new GLTFLoader();

loader.load(

  'head.glb',

  (gltf) => {

    model = gltf.scene;

    //
    // CENTER
    //

    const box =
      new THREE.Box3()
        .setFromObject(model);

    const center =
      box.getCenter(
        new THREE.Vector3()
      );

    model.position.sub(center);

    //
    // SCALE
    //

    const size =
      box.getSize(
        new THREE.Vector3()
      ).length();

    const scale =
      2 / size;

    model.scale.setScalar(scale);

    //
    // MATERIAL
    //

    model.traverse((child) => {

      if (child.isMesh) {

        child.material =
          new THREE.MeshStandardMaterial({

            color: 0xffffff

          });

      }

    });

    scene.add(model);

    console.log('MODEL LOADED');

  },

  undefined,

  (error) => {

    console.error(error);

  }

);

//
// CURSOR
//

let targetX = 0;
let targetY = 0;

let currentX = 0;
let currentY = 0;

window.addEventListener(

  'mousemove',

  (e) => {

    targetX =
      (e.clientX / window.innerWidth - 0.5);

    targetY =
      (e.clientY / window.innerHeight - 0.5);

  }

);

//
// MOBILE
//

window.addEventListener(

  'touchmove',

  (e) => {

    const touch = e.touches[0];

    targetX =
      (touch.clientX / window.innerWidth - 0.5);

    targetY =
      (touch.clientY / window.innerHeight - 0.5);

  }

);

//
// ANIMATION
//

function animate() {

  requestAnimationFrame(animate);

  if (model) {

    currentX +=
      (targetX - currentX) * 0.06;

    currentY +=
      (targetY - currentY) * 0.06;

    model.rotation.y =
      currentX * 1.2;

    model.rotation.x =
      currentY * 0.7;

  }

  effect.render(scene, camera);

}

animate();

//
// RESIZE
//

window.addEventListener(

  'resize',

  () => {

    camera.aspect =
      window.innerWidth /
      window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
      window.innerWidth,
      window.innerHeight
    );

    effect.setSize(
      window.innerWidth,
      window.innerHeight
    );

  }

);

</script>

</body>
</html>
