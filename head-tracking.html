<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Glass Head</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>

<!-- Подключаем Three.js через Import Map -->
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // 1. Настройка сцены
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000); // Черный фон, как на фото

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 4); // Позиция камеры

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping; // Кинематографичная цветокоррекция
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 2. Загрузка карты окружения (HDR)
    // Это ключевой момент для эффекта хрома. Используем бесплатную карту с Poly Haven.
    const rgbeLoader = new RGBELoader();
    rgbeLoader.load('https://dl.polyhaven.org/file/ph-assets/HDRIs/low/1k/studio_small_03_1k.hdr', function (texture) {
        texture.mapping = THREE.EquirectangularReflectionMapping;
        
        // Устанавливаем окружение для сцены (отражения)
        scene.environment = texture;
        
        // Создаем материал "Жидкий Хром"
        const chromeMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 1.0,      // Полная металличность
            roughness: 0.15,     // Очень гладкая поверхность
            clearcoat: 1.0,      // Дополнительный слой лака для блеска
            clearcoatRoughness: 0.1,
            envMapIntensity: 2.0 // Усиливаем отражения
        });

        // --- ЗДЕСЬ НУЖНО ЗАГРУЗИТЬ ВАШУ МОДЕЛЬ ГОЛОВЫ ---
        // Пока я создаю примерную геометрию (сферу), чтобы вы видели результат.
        // Замените этот блок на загрузчик GLTFLoader для вашей модели.
        
        const geometry = new THREE.IcosahedronGeometry(1.2, 4);
        const mesh = new THREE.Mesh(geometry, chromeMaterial);
        scene.add(mesh);

        // Пример очков (простая геометрия)
        // В реальности очки должны быть частью модели или отдельным мешем
        const glassesMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            transmission: 0.9, // Прозрачность
            opacity: 1,
            metalness: 0,
            roughness: 0,
            ior: 1.5,
            thickness: 0.1,
            specularIntensity: 1,
            envMapIntensity: 1
        });
        
        // Простая дужка очков для примера
        const glassesGeo = new THREE.BoxGeometry(2.2, 0.05, 0.05);
        const glasses = new THREE.Mesh(glassesGeo, glassesMat);
        glasses.position.z = 1.1;
        scene.add(glasses);
    });

    // Анимация
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // Ресайз окна
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
